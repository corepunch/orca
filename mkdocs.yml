site_name: Orca API Documentation
docs_dir: docs
site_dir: site

nav:
  - Welcome: index.md
  - Module XML Guide: MODULE_XML_GUIDE.md
  - Mesh Pointer Boxing: MESH_POINTER_BOXING.md

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - tables
  - toc:
      permalink: true
