site_name: Orca API Documentation
docs_dir: docs
site_dir: site

nav:
  - Welcome: index.md
  - Quickstart: quickstart.md
  - Architecture:
    - Overview: architecture/index.md
    - Object + Component System: architecture/object-component-system.md
    - Plugin System: architecture/plugin-system.md
    - Code Generation: architecture/code-generation.md
    - Macros Reference: architecture/macros-reference.md
    - Improvements & Gotchas: improvements.md
  - API Reference:
    - Overview: api/index.md
    - geometry: api/geometry/README.md
    - core: api/core/README.md
    - UIKit: api/UIKit/README.md
    - SceneKit: api/SceneKit/README.md
    - SpriteKit: api/SpriteKit/README.md
  - Module XML Guide: MODULE_XML_GUIDE.md
  - Mesh Pointer Boxing: MESH_POINTER_BOXING.md
  - WebGL / Emscripten: webgl.md
  - Animations: animations.md
  - Developer Notes:
    - Renderer Internals: renderer-internals.md
    - Lua Scripting: lua-scripting.md
    - Dark Reign Formats: dark-reign-formats.md
    - Testing Guide: testing.md

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
