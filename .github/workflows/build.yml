name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN
permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libpng-dev \
            libfreetype6-dev \
            libjpeg-dev \
            liblua5.4-dev \
            libxml2-dev \
            liblz4-dev \
            zlib1g-dev \
            libcurl4-openssl-dev \
            libwayland-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev

      - name: Build
        run: make

      - name: Test
        run: make test

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: orca-linux
          path: |
            build/bin/orca
            build/lib/liborca.*
            build/lib/libplatform.*
            build/lib/liborca/
            build/share/

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install \
            libpng \
            freetype \
            jpeg-turbo \
            lua \
            libxml2 \
            lz4 \
            zlib \
            curl \
            pkg-config

      - name: Build
        run: make

      - name: Test
        run: make test

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: orca-macos
          path: |
            build/bin/orca
            build/lib/liborca.*
            build/lib/libplatform.*
            build/lib/liborca/
            build/share/

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: orca-linux
          path: artifacts/linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: orca-macos
          path: artifacts/macos

      - name: Package artifacts
        run: |
          tar czf orca-linux.tar.gz -C artifacts/linux .
          tar czf orca-macos.tar.gz -C artifacts/macos .

      - name: Create or update rolling "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          body: |
            Automated build from the `main` branch (commit ${{ github.sha }}).

            These are pre-built binaries for Linux and macOS. For versioned releases, see the tagged releases.

            **Install via LuaRocks (from source):**
            ```
            luarocks install --dev orca
            ```
          files: |
            orca-linux.tar.gz
            orca-macos.tar.gz
          prerelease: true
          make_latest: false
