name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN
permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            luarocks \
            libpng-dev \
            libfreetype6-dev \
            libjpeg-dev \
            liblua5.4-dev \
            libxml2-dev \
            liblz4-dev \
            zlib1g-dev \
            libcurl4-openssl-dev \
            libwayland-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            xvfb

      - name: Install MoonScript
        run: |
          ROCKS_TREE="$HOME/.luarocks"
          sudo luarocks install argparse
          sudo luarocks install moonscript
          echo "LUA_PATH=$ROCKS_TREE/share/lua/5.4/?.lua;$ROCKS_TREE/share/lua/5.4/?/init.lua;;" >> "$GITHUB_ENV"
          echo "LUA_CPATH=$ROCKS_TREE/lib/lua/5.4/?.so;;" >> "$GITHUB_ENV"

      - name: Build
        run: make

      - name: Test (headless layout)
        run: make test-headless

      - name: Test (display required)
        run: xvfb-run make test

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: orca-linux
          path: |
            build/bin/orca
            build/lib/liborca.*
            build/lib/libplatform.*
            build/lib/liborca/
            build/share/

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install \
            libpng \
            freetype \
            jpeg-turbo \
            lua@5.4 \
            luarocks \
            libxml2 \
            lz4 \
            zlib \
            curl \
            pkg-config

      - name: Configure Lua 5.4 toolchain
        run: |
          LUA_DIR="$(brew --prefix lua@5.4)"
          ROCKS_TREE="$HOME/.luarocks"
          echo "$LUA_DIR/bin" >> "$GITHUB_PATH"
          echo "PKG_CONFIG_PATH=$LUA_DIR/lib/pkgconfig:${PKG_CONFIG_PATH}" >> "$GITHUB_ENV"
          echo "LUA_DIR=$LUA_DIR" >> "$GITHUB_ENV"
          echo "ROCKS_TREE=$ROCKS_TREE" >> "$GITHUB_ENV"
          echo "LUA_PATH=$ROCKS_TREE/share/lua/5.4/?.lua;$ROCKS_TREE/share/lua/5.4/?/init.lua;$LUA_DIR/share/lua/5.4/?.lua;$LUA_DIR/share/lua/5.4/?/init.lua;;" >> "$GITHUB_ENV"
          echo "LUA_CPATH=$ROCKS_TREE/lib/lua/5.4/?.so;$LUA_DIR/lib/lua/5.4/?.so;;" >> "$GITHUB_ENV"

      - name: Install MoonScript
        run: |
          luarocks install argparse
          luarocks install moonscript

      - name: Build
        run: make

      - name: Test (headless layout)
        run: make test-headless

      - name: Test
        run: make test

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: orca-macos
          path: |
            build/bin/orca
            build/lib/liborca.*
            build/lib/libplatform.*
            build/lib/liborca/
            build/share/

  build-webgl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.74
          actions-cache-folder: emsdk-cache

      - name: Build WASM dependencies (lua5.4, libxml2, liblz4)
        # Builds into build/wasm-deps/ (WASM_DEPS_DIR default in Makefile.webgl).
        run: emmake make wasm-deps

      - name: Build platform library for WebGL
        run: |
          mkdir -p build/lib
          emmake make -C libs/platform OUTDIR=../../build/lib

      - name: Build Orca for WebGL
        run: |
          COMMIT_TITLE=$(git log -1 --format=%s)
          emmake make webgl WEBGL_EMCC=emcc WEBGL_VERSION="${COMMIT_TITLE}"

      - name: Upload WebGL artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: orca-webgl
          path: build/webgl/

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: orca-linux
          path: artifacts/linux

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: orca-macos
          path: artifacts/macos

      - name: Package artifacts
        run: |
          tar czf orca-linux.tar.gz -C artifacts/linux .
          tar czf orca-macos.tar.gz -C artifacts/macos .

      - name: Create or update rolling "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build"
          body: |
            Automated build from the `main` branch (commit ${{ github.sha }}).

            These are pre-built binaries for Linux and macOS. For versioned releases, see the tagged releases.

            **Install via LuaRocks (from source):**
            ```
            luarocks install --dev orca
            ```
          files: |
            orca-linux.tar.gz
            orca-macos.tar.gz
          prerelease: true
          make_latest: false
