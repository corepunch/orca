name: "Copilot Setup Steps"

# Run whenever this file changes so the setup can be validated easily.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # Job name MUST be `copilot-setup-steps` — Copilot picks it up by name.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read  # needed for checkout + submodule init

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── System libraries required by the C build ──────────────────────────
      - name: Install system build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libpng-dev \
            libfreetype6-dev \
            libjpeg-dev \
            liblua5.4-dev \
            libxml2-dev \
            liblz4-dev \
            zlib1g-dev \
            libcurl4-openssl-dev \
            libwayland-dev \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            xvfb

      # ── pyphp — Python-to-PHP bridge for code generation ──────────────────
      # Required by `cd tools && make`.  The submodule lives at tools/pyphp.
      - name: Install pyphp (code-generation bridge)
        run: pip install -e tools/pyphp

      # ── MkDocs (docs preview) ──────────────────────────────────────────────
      - name: Install MkDocs Material (docs build)
        run: pip install mkdocs-material
