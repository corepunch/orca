name: Deploy to GitHub Pages

on:
  # Trigger on push to the main branch
  push:
    branches:
      - main

  # Allow manual workflow dispatch
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between
# the run in-progress and latest queued. However, do NOT cancel
# in-progress runs as we want to allow these production deployments
# to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Build WASM dependencies (lua5.4, libxml2, liblz4)
        run: emmake make wasm-deps

      - name: Build platform library for WebGL
        run: |
          mkdir -p build/lib
          emmake make -C libs/platform OUTDIR=../../build/lib

      - name: Generate DTD and API docs
        run: |
          cd tools
          make dtd
          make docs
          cp ../QUICKSTART.md ../docs/quickstart.md

      - name: Build documentation site
        run: mkdocs build

      - name: Build WebGL demo (Example project)
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          emmake make webgl-demo WEBGL_EMCC=emcc WEBGL_VERSION="Build #${{ github.run_number }} (${SHORT_SHA})"

      - name: Copy WebGL demo into site
        run: |
          mkdir -p site/demo
          cp -r build/webgl/. site/demo/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the MkDocs-generated site directory
          path: 'site'

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
