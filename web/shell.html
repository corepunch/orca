<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ORCA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    canvas#canvas {
      display: block;
      width: 100%;
      height: 100%;
      outline: none;
      touch-action: none;
    }

    /* ── Loading overlay ────────────────────────────────────────── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #333;
      z-index: 10;
      transition: opacity 0.3s ease;
    }
    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #progress-bar-wrap {
      width: 240px;
      height: 6px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: #fff;
      border-radius: 3px;
      transition: width 0.15s ease;
    }

    /* ── Corner info overlay ────────────────────────────────────── */
    #corner-info {
      position: fixed;
      bottom: 8px;
      right: 8px;
      font-family: monospace;
      font-size: 10px;
      line-height: 1.4;
      text-align: right;
      pointer-events: none;
      z-index: 5;
    }
    #last-message {
      color: rgba(255, 255, 255, 0.35);
      max-width: 360px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #build-id {
      color: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <!-- Loading overlay with progress bar -->
  <div id="loading-overlay">
    <div id="progress-bar-wrap">
      <div id="progress-bar"></div>
    </div>
  </div>

  <!-- Full-screen canvas -->
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

  <!-- Corner info: last debug message + build ID -->
  <div id="corner-info">
    <div id="last-message"></div>
    <div id="build-id">@@BUILD_VERSION@@</div>
  </div>

  <script>
    var LOADING_FADE_DELAY_MS = 300; /* matches the 0.3s CSS transition on #loading-overlay */
    var progressBar     = document.getElementById('progress-bar');
    var loadingOverlay  = document.getElementById('loading-overlay');
    var lastMessageEl   = document.getElementById('last-message');

    function setLastMessage(text) {
      if (lastMessageEl) lastMessageEl.textContent = text;
    }

    // Route all console output to the corner last-message display (not to a textarea).
    (function () {
      function formatArgs(args) {
        return Array.prototype.slice.call(args).map(function (a) {
          if (typeof a === 'object') {
            try { return JSON.stringify(a); } catch (e) { return String(a); }
          }
          return String(a);
        }).join(' ');
      }
      function patchConsoleMethod(method) {
        var orig = console[method].bind(console);
        console[method] = function () {
          orig.apply(console, arguments);
          setLastMessage(formatArgs(arguments));
        };
      }
      patchConsoleMethod('log');
      patchConsoleMethod('info');
      patchConsoleMethod('warn');
      patchConsoleMethod('error');
    })();

    var Module = {
      print: function (text) {
        if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
        console.log(text);
      },
      printErr: function (text) {
        if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
        console.error(text);
      },
      canvas: (function () {
        var canvas = document.getElementById('canvas');
        canvas.addEventListener('webglcontextlost', function (e) {
          alert('WebGL context lost. Please reload the page.');
          e.preventDefault();
        }, false);
        return canvas;
      })(),
      setStatus: function (text) {
        setLastMessage(text || '');
      },
      totalDependencies: 0,
      monitorRunDependencies: function (left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        var total = this.totalDependencies;
        var pct = total > 0 ? Math.round((total - left) / total * 100) : (left === 0 ? 100 : 0);
        if (progressBar) progressBar.style.width = pct + '%';
        if (left === 0) {
          setTimeout(function () {
            if (loadingOverlay) loadingOverlay.classList.add('hidden');
          }, LOADING_FADE_DELAY_MS);
        }
      }
    };

    window.addEventListener('error', function (e) {
      setLastMessage('Error: ' + e.message);
    });

    window.addEventListener('unhandledrejection', function (e) {
      var msg = (e.reason && e.reason.message) ? e.reason.message : String(e.reason);
      setLastMessage('Error: ' + msg);
    });
  </script>
  {{{ SCRIPT }}}
</body>
</html>
