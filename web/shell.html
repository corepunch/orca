<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ORCA WebGL Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #111;
      color: #ccc;
      font-family: monospace;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #canvas-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      max-width: 100vw;
    }
    canvas#canvas {
      display: block;
      width: 854px;
      height: 480px;
      max-width: 100vw;
      border: 2px solid #333;
      background: #000;
      outline: none;
    }
    #status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 8px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-top: none;
      font-size: 11px;
    }
    #status { color: #aaa; }
    #build-version { color: #555; }
    #output {
      width: 854px;
      max-width: 100vw;
      height: 100px;
      background: #0a0a0a;
      color: #0c0;
      padding: 4px 8px;
      font-size: 11px;
      border: 1px solid #222;
      border-top: none;
      overflow-y: auto;
      resize: vertical;
      outline: none;
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <canvas id="canvas" width="854" height="480"
            oncontextmenu="event.preventDefault()"
            tabindex="-1"></canvas>
    <div id="status-bar">
      <span id="status">Loading&hellip;</span>
      <span id="build-version">@@BUILD_VERSION@@</span>
    </div>
    <textarea id="output" rows="6" readonly></textarea>
  </div>
  <script>
    var outputEl = document.getElementById('output');
    var statusEl = document.getElementById('status');

    function appendOutput(text) {
      if (outputEl) {
        outputEl.value += text + '\n';
        outputEl.scrollTop = outputEl.scrollHeight;
      }
    }

    var Module = {
      print: function (text) {
        if (arguments.length > 1) {
          text = Array.prototype.slice.call(arguments).join(' ');
        }
        console.log(text);
        appendOutput(text);
      },
      printErr: function (text) {
        if (arguments.length > 1) {
          text = Array.prototype.slice.call(arguments).join(' ');
        }
        console.error(text);
        appendOutput('ERROR: ' + text);
      },
      canvas: (function () {
        var canvas = document.getElementById('canvas');
        canvas.addEventListener('webglcontextlost', function (e) {
          alert('WebGL context lost. Please reload the page.');
          e.preventDefault();
        }, false);
        return canvas;
      })(),
      setStatus: function (text) {
        if (statusEl) statusEl.textContent = text || 'Ready';
      },
      totalDependencies: 0,
      monitorRunDependencies: function (left) {
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(left
          ? 'Loading… (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
          : 'Ready');
      }
    };

    window.addEventListener('error', function (e) {
      Module.setStatus('Exception: ' + e.message);
      appendOutput('EXCEPTION: ' + e.message);
    });
  </script>
  {{{ SCRIPT }}}
</body>
</html>
